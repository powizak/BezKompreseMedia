name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   PUBLIC_HCAPTCHA_SITE_KEY  - hCaptcha site key (public, baked into HTML)
#   PUBLIC_COOKIEYES_ID       - CookieYes site ID (public, baked into HTML)
#   HCAPTCHA_SECRET_KEY       - hCaptcha secret key (server-side, written to config.php)
#   FTP_SERVER                - WEDOS FTP host (e.g. ftp.bezkompresemedia.cz)
#   FTP_USER                  - FTP username
#   FTP_PASSWORD              - FTP password

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          PUBLIC_HCAPTCHA_SITE_KEY: ${{ secrets.PUBLIC_HCAPTCHA_SITE_KEY }}
          PUBLIC_COOKIEYES_ID: ${{ secrets.PUBLIC_COOKIEYES_ID }}

      # Server-side secrets for the PHP form handler. WEDOS shared hosting has
      # no way to set env vars, so they are written to a config file that
      # .htaccess blocks from direct access.
      - name: Generate config.php
        env:
          HCAPTCHA_SECRET_KEY: ${{ secrets.HCAPTCHA_SECRET_KEY }}
        run: |
          printf '<?php\nreturn [\n    '\''hcaptcha_secret'\'' => '\''%s'\'',\n];\n' "$HCAPTCHA_SECRET_KEY" > dist/config.php

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          # The FTP account root IS the document root on this WEDOS webspace
          # (verified 2026-07-17: server-dir www/ created a /www/ subfolder)
          server-dir: ./
